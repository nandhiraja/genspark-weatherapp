name: Deploy Angular Weather App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: WeatherApp/package-lock.json

      # 3. Configure GitHub Pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # 4. Install dependencies
      - name: Install dependencies
        working-directory: WeatherApp
        run: npm ci

      # 5. Build Angular application
      - name: Build Angular application
        working-directory: WeatherApp
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      # 6. Upload build artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./WeatherApp/dist/WeatherApp/browser

      # 7. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

