name: Deploy Angular Weather App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: WeatherApp/package-lock.json

      # 3. Install dependencies
      - name: Install dependencies
        working-directory: WeatherApp
        run: npm ci

      # 4. Build Angular application
      - name: Build Angular application
        working-directory: WeatherApp
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./WeatherApp/dist/WeatherApp/browser
          force_orphan: true
